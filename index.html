<!DOCTYPE html>
<html>
<head>
  <title>Product CRUD</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <h1>Product CRUD</h1>

  <!-- Formulário para adicionar produtos -->
  <form id="add-product-form">
    <h2>Add Product</h2>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="price">Price:</label>
    <input type="number" id="price" name="price" required step="0.01">
    <button type="submit">Add</button>
  </form>

  <!-- Formulário para atualizar produtos -->
  <form id="update-product-form">
    <h2>Update Product</h2>
    <label for="update-id">Product ID:</label>
    <input type="text" id="update-id" name="update-id" readonly>
    <label for="update-name">Name:</label>
    <input type="text" id="update-name" name="update-name" required>
    <label for="update-price">Price:</label>
    <input type="number" id="update-price" name="update-price" required step="0.01">
    <button type="submit">Update</button>
  </form>

  <!-- Lista de produtos -->
  <ul id="products"></ul>

  <script src="app.js"></script>
</body>
</html>
